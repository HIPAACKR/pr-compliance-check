name: 'Compliance Check'
description: 'Submits PR diff to a compliance API and posts the analysis as a PR comment.'
author: 'UbiComply'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  api-key:
    description: 'Compliance API key'
    required: true
  github-token:
    description: 'GitHub token for posting PR comments'
    required: true
    default: ${{ github.token }}
  frameworks:
    description: 'JSON array of compliance frameworks to map findings against, e.g. ["hipaa","cmmc"]. Omit for CWE-only output.'
    required: false
    default: ''
  poll-interval:
    description: 'Seconds between status polls'
    required: false
    default: '5'
  poll-timeout:
    description: 'Max seconds to wait for a result. Large or security-sensitive PRs run a deeper agentic sweep that can run well over an hour under shared-GPU contention. NOTE: the server job TTL (COMPLIANCE_PR_JOB_TTL_SECONDS, default 2h) must be >= this value, or a job running past the TTL returns job_not_found mid-poll instead of finishing.'
    required: false
    default: '10800'

runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}

    - name: Generate diff and collect commit messages
      shell: bash
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        MERGE_BASE=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
        # Persist the merge-base so the submit step can send it as base_sha —
        # the server keys baseline lookup + delta on (repo_id, base_sha).
        echo "MERGE_BASE=$MERGE_BASE" >> "$GITHUB_ENV"
        git diff "$MERGE_BASE" "$HEAD_SHA" > /tmp/pr.diff

        DIFF_SIZE=$(wc -c < /tmp/pr.diff | tr -d " ")
        echo "Diff size: ${DIFF_SIZE} bytes"

        # Guard: skip analysis if diff is empty (e.g. whitespace-only or metadata-only PR)
        if [ ! -s /tmp/pr.diff ]; then
          echo "Empty diff — nothing to analyze."
          exit 0
        fi

        # Guard: fail if diff exceeds the 5 MB server-side cap
        if [ "$DIFF_SIZE" -gt 5242880 ]; then
          echo "::error::Diff size (${DIFF_SIZE} bytes) exceeds the 5 MB server limit. Please split the PR into smaller changes."
          exit 1
        fi

        # Collect subject + body per commit, NUL-delimited to safely handle newlines.
        # Each element in the JSON array is one full commit message (subject + blank line + body),
        # with trailing whitespace trimmed. Commits with no body produce subject-only strings.
        # Server caps at 20 entries in the prompt; rest are collapsed server-side.
        git log "$MERGE_BASE".."$HEAD_SHA" --format="%s%n%n%b%x00" | \
          awk 'BEGIN{RS="\0"} {gsub(/[[:space:]]+$/, ""); if (length > 0) print}' | \
          jq -R . | jq -s . > /tmp/commit_messages.json
        echo "Commit messages: $(cat /tmp/commit_messages.json)"

    - name: Package source for the agentic sweep
      shell: bash
      run: |
        # The agentic engine reads the actual code; upload the checked-out HEAD
        # so it can. Tar from the repo root (entries at top level — the server
        # extracts to the scan root, no wrapper dir) and exclude VCS/deps/build
        # to stay under the 100 MB cap. FAST is deprecated: without this (and no
        # configured codebase reuse) the server returns BLOCKED, not a pass.
        tar czf /tmp/source.tar.gz \
          --exclude='.git' --exclude='node_modules' --exclude='vendor' \
          --exclude='tmp' --exclude='log' --exclude='.bundle' --exclude='*.log' \
          -C "$GITHUB_WORKSPACE" .
        SZ=$(wc -c < /tmp/source.tar.gz | tr -d ' ')
        echo "source.tar.gz: ${SZ} bytes"
        if [ "$SZ" -gt 104857600 ]; then
          echo "::error::Source archive ${SZ} bytes exceeds the 100 MB server cap. Add excludes, or use codebase reuse for large repos."
          exit 1
        fi

    - name: Submit diff to compliance API
      shell: bash
      env:
        COMPLIANCE_API_KEY: ${{ inputs.api-key }}
        FRAMEWORKS: ${{ inputs.frameworks }}
        # PR metadata — sent as multipart form fields (server reads these);
        # values injected via env so PR titles with quotes can't break the shell.
        REPO_ID: ${{ github.repository }}
        BASE_SHA: ${{ env.MERGE_BASE }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      run: |
        COMMIT_MESSAGES=$(cat /tmp/commit_messages.json)

        # Include README only if it exists in the repo root
        if [ -f README.md ]; then
          README_ARG=(-F "readme=@README.md;type=text/plain")
        else
          README_ARG=()
        fi

        # Include frameworks only if the input was provided
        if [ -n "$FRAMEWORKS" ]; then
          FRAMEWORKS_ARG=(-F "frameworks=$FRAMEWORKS")
        else
          FRAMEWORKS_ARG=()
        fi

        curl -sS -X POST \
          -H "Authorization: Bearer $COMPLIANCE_API_KEY" \
          -F "diff=@/tmp/pr.diff;type=text/plain" \
          -F "source=@/tmp/source.tar.gz;type=application/gzip" \
          "${README_ARG[@]}" \
          -F "commit_messages=$COMMIT_MESSAGES" \
          "${FRAMEWORKS_ARG[@]}" \
          -F "repo_id=$REPO_ID" \
          -F "base_sha=$BASE_SHA" \
          -F "head_sha=$HEAD_SHA" \
          -F "pr_number=$PR_NUMBER" \
          -F "pr_title=$PR_TITLE" \
          -F "pr_author=$PR_AUTHOR" \
          --max-time 300 \
          -o /tmp/submit_response.json \
          "https://llm.ubicomply.ai/sast/api/v1/compliance/pr-check/"

        JOB_ID=$(jq -r '.job_id' /tmp/submit_response.json)
        if [ -z "$JOB_ID" ] || [ "$JOB_ID" = "null" ]; then
          echo "::error::Submit did not return a job_id"
          cat /tmp/submit_response.json
          exit 1
        fi
        echo "$JOB_ID" > /tmp/job_id.txt
        echo "Submitted job: $JOB_ID"

    - name: Poll for result
      shell: bash
      env:
        COMPLIANCE_API_KEY: ${{ inputs.api-key }}
        POLL_INTERVAL_SECONDS: ${{ inputs.poll-interval }}
        POLL_TIMEOUT_SECONDS: ${{ inputs.poll-timeout }}
      run: |
        JOB_ID=$(cat /tmp/job_id.txt)

        DEADLINE=$(( $(date +%s) + POLL_TIMEOUT_SECONDS ))
        ATTEMPT=0
        while :; do
          ATTEMPT=$((ATTEMPT + 1))
          if [ "$(date +%s)" -ge "$DEADLINE" ]; then
            echo "::error::Polling timed out after ${POLL_TIMEOUT_SECONDS}s"
            exit 1
          fi

          HTTP_CODE=$(curl -sS \
            -H "Authorization: Bearer $COMPLIANCE_API_KEY" \
            --max-time 30 \
            -o /tmp/poll_response.json \
            -w "%{http_code}" \
            "https://llm.ubicomply.ai/sast/api/v1/compliance/pr-check/jobs/${JOB_ID}")

          echo "Attempt $ATTEMPT - HTTP: $HTTP_CODE"

          # Handle 429 rate limit — honour Retry-After from response body
          if [ "$HTTP_CODE" = "429" ]; then
            RETRY_AFTER=$(jq -r '.retry_after_seconds // 60' /tmp/poll_response.json)
            echo "Rate limited. Waiting ${RETRY_AFTER}s before retrying..."
            sleep "$RETRY_AFTER"
            continue
          fi

          STATUS=$(jq -r '.status // "unknown"' /tmp/poll_response.json)
          echo "status: $STATUS"

          case "$STATUS" in
            success)
              jq -r '.result' /tmp/poll_response.json > /tmp/api_response.md
              jq -r '.overall_status // "?"' /tmp/poll_response.json > /tmp/overall_status.txt
              echo "Got result ($(wc -c < /tmp/api_response.md) bytes); verdict: $(cat /tmp/overall_status.txt)"
              break
              ;;
            failed)
              ERR=$(jq -r '.error // "unknown error"' /tmp/poll_response.json)
              printf '## 🔒 Compliance Review\n\n❌ Analysis failed.\n\n```\n%s\n```\n' "$ERR" \
                > /tmp/api_response.md
              echo "blocked" > /tmp/overall_status.txt
              break
              ;;
            pending|running|queued)
              sleep "$POLL_INTERVAL_SECONDS"
              ;;
            unknown)
              # Handle job_not_found or any response missing a status field
              ERR=$(jq -r '.error // "unknown error"' /tmp/poll_response.json)
              if [ "$ERR" = "job_not_found" ]; then
                echo "::error::Job ${JOB_ID} not found on server."
                exit 1
              fi
              echo "::error::Unexpected response: $ERR"
              cat /tmp/poll_response.json
              exit 1
              ;;
            *)
              echo "::error::Unexpected status: $STATUS"
              cat /tmp/poll_response.json
              exit 1
              ;;
          esac
        done

    - name: Post comment on PR
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        BODY=$(jq -Rs '{body: .}' < /tmp/api_response.md)
        curl -sS -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -d "$BODY" \
          "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments"

    - name: Enforce compliance verdict
      shell: bash
      run: |
        # Fail the check on a non-passing verdict so it blocks merge (with
        # branch protection). FAST is deprecated, so 'blocked' (no source /
        # codebase reuse, or the sweep failed) fails the check too.
        V=$(cat /tmp/overall_status.txt 2>/dev/null || echo "?")
        echo "Compliance verdict: $V"
        case "$V" in
          fail|blocked)
            echo "::error::Compliance check did not pass (verdict: $V)"
            exit 1 ;;
          clean|warn) echo "Verdict acceptable." ;;
          *) echo "::warning::Unknown verdict '$V' — not failing the check." ;;
        esac
